# Frontend build (CI). Production deploy is via Vercel (GitHub connected).
# Vercel auto-deploys latest code on push to main/master.

name: Frontend Build

on:
  push:
    branches: [main, master]
    paths: ['frontend-web/**']
  pull_request:
    branches: [main, master]
    paths: ['frontend-web/**']
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install dependencies
        working-directory: frontend-web
        run: npm ci

      - name: Build
        working-directory: frontend-web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://fxmark-backend-541368249845.us-central1.run.app' }}
        run: npm run build
