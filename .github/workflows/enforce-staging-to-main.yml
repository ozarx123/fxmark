name: Enforce Staging Promotion

on:
  pull_request:
    branches: [main]

jobs:
  enforce-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Allow only staging -> main
        run: |
          if [ "${{ github.head_ref }}" != "staging" ]; then
            echo "Only pull requests from 'staging' can be merged into 'main'."
            echo "Current source branch: '${{ github.head_ref }}'"
            exit 1
          fi
          echo "Promotion rule satisfied: staging -> main"
