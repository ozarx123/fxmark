# Build backend Docker image and deploy to Cloud Run
# Run from repo root: gcloud builds submit --config=cloudbuild.yaml
# Set substitutions or use defaults: _SERVICE_NAME=fxmark-backend, _REGION=us-central1

substitutions:
  _SERVICE_NAME: 'fxmark-backend'
  _REGION: 'us-central1'
  _IMAGE_NAME: 'fxmark-backend'

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/${_IMAGE_NAME}:${SHORT_SHA}'
      - '-t'
      - 'gcr.io/${PROJECT_ID}/${_IMAGE_NAME}:latest'
      - '-f'
      - 'backend/Dockerfile'
      - 'backend'
    dir: '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - 'gcr.io/${PROJECT_ID}/${_IMAGE_NAME}:${SHORT_SHA}'
    waitFor: ['build']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - 'gcr.io/${PROJECT_ID}/${_IMAGE_NAME}:${SHORT_SHA}'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
    waitFor: ['push']

images:
  - 'gcr.io/${PROJECT_ID}/${_IMAGE_NAME}:${SHORT_SHA}'
  - 'gcr.io/${PROJECT_ID}/${_IMAGE_NAME}:latest'
