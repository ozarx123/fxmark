# Step 1: Build Docker image and push to Artifact Registry (no local Docker required).
# From repo root: gcloud builds submit --config=docker/cloudbuild-backend.yaml .
# Step 2: Deploy to Cloud Run (see DEPLOY.md): gcloud run deploy fxmark-backend --image=...
substitutions:
  _REGION: 'us-central1'

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/fxmark/backend:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/fxmark/backend:latest'
      - '-f'
      - 'docker/Dockerfile.backend.prod'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/fxmark/backend:${SHORT_SHA}'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/fxmark/backend:latest'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/fxmark/backend:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/fxmark/backend:latest'
